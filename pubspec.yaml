name: Gra
description: "Game Review App"
publish_to: "none"

version: 0.2.1+3

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  file_picker: ^10.3.10
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  path: ^1.9.1
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/gra-icon.png"
  windows:
    generate: true
    image_path: "assets/gra-icon.png"
    icon_size: 48
  linux:
    generate: true
    image_path: "assets/gra-icon.png"
